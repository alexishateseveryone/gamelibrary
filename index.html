<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sanrio Merge - AJ for Rhyane</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff6b81">

    <style>
        :root { --pink: #ffb6c1; --dark-pink: #ff6b81; --soft-white: rgba(255, 255, 255, 0.9); }
        body { margin: 0; background: #fff5f8; overflow: hidden; font-family: 'Arial Rounded MT Bold', sans-serif; touch-action: none; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        #start-modal {
            position: absolute; inset: 0; background: rgba(255, 182, 193, 0.8);
            display: flex; justify-content: center; align-items: center; z-index: 100;
            backdrop-filter: blur(5px);
        }
        #modal-content {
            background: white; padding: 40px; border-radius: 30px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 5px solid white; width: 300px;
        }
        .start-btn { 
            background: var(--dark-pink); color: white; border: none; padding: 15px 40px; 
            border-radius: 50px; font-size: 20px; cursor: pointer; font-weight: bold;
            transition: transform 0.2s; box-shadow: 0 5px 15px rgba(255, 107, 129, 0.4);
        }

        #gameover-modal {
            position: absolute; inset: 0; background: rgba(255, 182, 193, 0.95);
            display: flex; justify-content: center; align-items: center; z-index: 100;
            backdrop-filter: blur(5px);
        }
        #gameover-content {
            background: white; padding: 50px 40px; border-radius: 30px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); border: 5px solid white; width: 280px;
            animation: popModal 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popModal { 
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #game-container { 
            position: relative; 
            width: 90vmin; 
            height: 130vmin; 
            max-width: 450px; 
            max-height: 650px;
            aspect-ratio: 450 / 650;
            border: 8px solid var(--pink); border-radius: 20px; 
            background-color: white;
            background-image: radial-gradient(var(--pink) 15%, transparent 16%), radial-gradient(var(--pink) 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            animation: moveBg 12s linear infinite;
            box-shadow: inset -8px 0 0 rgba(255, 107, 129, 0.4), inset 8px 0 0 rgba(255, 107, 129, 0.4), 0 20px 50px rgba(255,182,193,0.4); 
            overflow: hidden; 
            transition: transform 0.1s ease-out;
            flex-shrink: 0;
        }

        .shake { animation: shakeEffect 0.4s ease-in-out; }
        @keyframes shakeEffect { 0%, 100% { transform: translate(0, 0); } 5% { transform: translate(-15px, 0); } 10% { transform: translate(15px, 0); } 15% { transform: translate(-15px, 0); } 20% { transform: translate(15px, 0); } 25% { transform: translate(-12px, 0); } 30% { transform: translate(12px, 0); } 35% { transform: translate(-10px, 0); } 40% { transform: translate(10px, 0); } 45% { transform: translate(-8px, 0); } 50% { transform: translate(8px, 0); } 55% { transform: translate(-6px, 0); } 60% { transform: translate(6px, 0); } 65% { transform: translate(-4px, 0); } 70% { transform: translate(4px, 0); } 75% { transform: translate(-2px, 0); } 80% { transform: translate(2px, 0); } }
        @keyframes moveBg { from { background-position: 0 0, 30px 30px; } to { background-position: 120px 120px, 150px 150px; } }
        
        #ui-overlay { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        #score-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: var(--soft-white); padding: 10px; border-radius: 12px; border: 2px solid var(--pink); }
        .value { font-size: 22px; color: var(--dark-pink); }

        #announcer {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 48px; color: #ff4757; text-align: center; font-weight: bold;
            text-shadow: 3px 3px 0px white, 0 0 20px rgba(255, 71, 87, 0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .pop-announcer { transform: translate(-50%, -50%) scale(1) !important; }
    </style>
</head>
<body>

<div id="start-modal">
    <div id="modal-content">
        <h1 style="color: var(--dark-pink); margin-bottom: 5px;">Hello!</h1>
        <p style="color: #888; font-size: 14px;">Preparing your cute friends...</p>
        
        <div id="loading-container" style="width: 100%; height: 12px; background: #eee; border-radius: 10px; margin: 20px 0; overflow: hidden; border: 1px solid #ddd;">
            <div id="loading-bar" style="width: 0%; height: 100%; background: var(--dark-pink); transition: width 0.3s ease;"></div>
        </div>

        <div id="best-score-info" style="display: none;">
            <div style="font-size: 11px; color: var(--dark-pink); text-transform: uppercase;">Best Score</div>
            <div id="modal-highscore" class="value" style="margin-bottom: 25px; font-size: 32px;">0</div>
            <button class="start-btn" onclick="startGame()">PLAY</button>
        </div>
    </div>
</div>

<div id="gameover-modal" style="display: none;">
    <div id="gameover-content">
        <h1 style="color: var(--dark-pink); margin-bottom: 15px;">GAME OVER!</h1>
        <div style="font-size: 14px; color: #888; margin-bottom: 10px;">Your Score</div>
        <div id="gameover-score" class="value" style="font-size: 48px; margin-bottom: 5px;">0</div>
        <div style="font-size: 12px; color: #999; margin-bottom: 25px;">Best: <span id="gameover-best">0</span></div>
        <button class="start-btn" onclick="restartGame()">PLAY AGAIN</button>
    </div>
</div>

<div id="game-container">
    <div id="ui-overlay">
        <div id="score-container">
            <div style="display: flex; gap: 20px; align-items: center;">
                <div>
                    <div style="font-size: 11px; color: var(--dark-pink);">SCORE</div>
                    <div id="score" class="value">0</div>
                </div>
                <div>
                    <div style="font-size: 11px; color: var(--dark-pink);">BEST</div>
                    <div id="highscore-ui" class="value">0</div>
                </div>
            </div>
        </div>
        <div id="announcer">NICE!</div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
// --- REGISTER PWA ---
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// --- CONFIG & ASSETS ---
const CONF = {
    width: 450, height: 650,
    fruits: [
        { name: 'hellokitty', radius: 25, src: 'hellokitty.png', color: '#FFB6C1' },
        { name: 'angel', radius: 35, src: 'angel.png', color: '#E0FFFF' },
        { name: 'pochaco', radius: 45, src: 'pochaco.png', color: '#98FB98' },
        { name: 'pompompurin', radius: 55, src: 'pompompurin.png', color: '#FFD700' },
        { name: 'keropi', radius: 70, src: 'keropi.png', color: '#ADFF2F' },
        { name: 'cinnamorol', radius: 85, src: 'cinnamorol.png', color: '#87CEEB' },
        { name: 'melody', radius: 100, src: 'melody.png', color: '#FF69B4' },
        { name: 'kuromi', radius: 120, src: 'kuromi.png', color: '#DDA0DD' }
    ]
};

// Get actual container dimensions
function getContainerDimensions() {
    const container = document.getElementById('game-container');
    return {
        width: container.clientWidth,
        height: container.clientHeight
    };
}

const images = {};
let loadedCount = 0;

// Progress Tracking
function trackProgress() {
    loadedCount++;
    const progress = (loadedCount / CONF.fruits.length) * 100;
    document.getElementById('loading-bar').style.width = progress + '%';
    if (loadedCount >= CONF.fruits.length) {
        setTimeout(() => {
            document.getElementById('loading-container').style.display = 'none';
            document.getElementById('best-score-info').style.display = 'block';
        }, 500);
    }
}

// Start Image Loading
CONF.fruits.forEach(f => { 
    images[f.name] = new Image(); 
    images[f.name].onload = trackProgress;
    images[f.name].onerror = trackProgress; // Prevent stuck bar if image fails
    images[f.name].src = f.src; 
});

// --- YOUR ORIGINAL SFX & MUSIC ---
const bgMusic = new Audio('bg.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.4;
const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSFX(type, pitchShift = 0) {
    if (AudioCtx.state === 'suspended') AudioCtx.resume();
    const osc = AudioCtx.createOscillator();
    const gain = AudioCtx.createGain();
    osc.connect(gain); gain.connect(AudioCtx.destination);

    if (type === 'drop') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, AudioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, AudioCtx.currentTime + 0.15);
        gain.gain.setValueAtTime(0.1, AudioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, AudioCtx.currentTime + 0.2);
    } else if (type === 'bounce') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, AudioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, AudioCtx.currentTime); // Made this 0.1 for louder bounce
        gain.gain.exponentialRampToValueAtTime(0.001, AudioCtx.currentTime + 0.1);
    } else if (type === 'merge') {
        osc.type = 'sine';
        const base = 400 + (pitchShift * 50);
        osc.frequency.setValueAtTime(base, AudioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(base * 1.5, AudioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.15, AudioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, AudioCtx.currentTime + 0.3);
    }
    osc.start(); osc.stop(AudioCtx.currentTime + 0.3);
}

// --- GAME STATE ---
let gameStarted = false;
let gameOver = false;
let highscore = localStorage.getItem('sanrio_highscore') || 0;
document.getElementById('modal-highscore').innerText = highscore;
document.getElementById('highscore-ui').innerText = highscore;

function startGame() {
    gameStarted = true;
    gameOver = false;
    score = 0;
    combo = 0;
    mouseX = CONF.width / 2;
    currentIdx = Math.floor(Math.random()*3);
    updateScore();
    document.getElementById('start-modal').style.display = 'none';
    document.getElementById('gameover-modal').style.display = 'none';
    if (AudioCtx.state === 'suspended') AudioCtx.resume();
    bgMusic.play().catch(() => {});
}

function restartGame() {
    Composite.clear(engine.world, false);
    const wallOpts = { isStatic: true, friction: 0.2, render: { visible: false } };
    World.add(engine.world, [
        Bodies.rectangle(CONF.width / 2, CONF.height - 10, CONF.width, 60, wallOpts),
        Bodies.rectangle(-15, CONF.height / 2, 30, CONF.height, wallOpts),
        Bodies.rectangle(CONF.width + 15, CONF.height / 2, 30, CONF.height, wallOpts)
    ]);
    startGame();
}

function gameOverFunc() {
    gameOver = true;
    gameStarted = false;
    bgMusic.pause();
    bgMusic.currentTime = 0;
    saveHighscore();
    document.getElementById('gameover-score').innerText = score;
    document.getElementById('gameover-best').innerText = highscore;
    document.getElementById('gameover-modal').style.display = 'flex';
}

// --- MATTER ENGINE ---
const { Engine, Render, Runner, World, Bodies, Events, Composite } = Matter;
const engine = Engine.create();
const canvas = document.getElementById('gameCanvas');

function initializeGame() {
    const dims = getContainerDimensions();
    CONF.width = dims.width;
    CONF.height = dims.height;
    
    const render = Render.create({
        canvas: canvas, engine: engine,
        options: { width: CONF.width, height: CONF.height, wireframes: false, background: 'transparent' }
    });
    
    const wallOpts = { isStatic: true, friction: 0.2, render: { visible: false } };
    World.add(engine.world, [
        Bodies.rectangle(CONF.width / 2, CONF.height - 10, CONF.width, 60, wallOpts),
        Bodies.rectangle(-15, CONF.height / 2, 30, CONF.height, wallOpts),
        Bodies.rectangle(CONF.width + 15, CONF.height / 2, 30, CONF.height, wallOpts)
    ]);
    
    Runner.run(Runner.create(), engine);
    Render.run(render);
    
    return render;
}

let render = initializeGame();

let score = 0, combo = 0, comboTimer = null, currentIdx = 0, mouseX = 0, canDrop = true;

const updateInput = (e) => {
    if(!gameStarted || gameOver) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    mouseX = Math.max(30, Math.min(CONF.width - 30, x * (CONF.width / rect.width)));
};

window.addEventListener('mousemove', updateInput);
window.addEventListener('touchmove', (e) => { if(gameStarted && !gameOver) e.preventDefault(); updateInput(e); }, {passive: false});
window.addEventListener('mouseup', () => { if(canDrop && gameStarted && !gameOver) drop(); });
window.addEventListener('touchend', () => { if(canDrop && gameStarted && !gameOver) drop(); });

function drop() {
    const f = CONF.fruits[currentIdx];
    const fruit = Bodies.circle(mouseX, 60, f.radius, {
        restitution: 0.4, label: 'fruit', plugin: { level: currentIdx, scale: 0.1, isMerging: false }
    });
    World.add(engine.world, fruit);
    playSFX('drop');
    canDrop = false;
    setTimeout(() => { currentIdx = Math.floor(Math.random()*3); canDrop = true; }, 700);
}

Events.on(engine, 'collisionStart', (event) => {
    event.pairs.forEach((pair) => {
        const { bodyA, bodyB } = pair;
        if (bodyA.label === 'fruit' && bodyB.label === 'fruit' && bodyA.plugin.level === bodyB.plugin.level && !bodyA.plugin.isMerging) {
            const lvl = bodyA.plugin.level;
            if (lvl < CONF.fruits.length - 1) {
                bodyA.plugin.isMerging = true; bodyB.plugin.isMerging = true;
                const midX = (bodyA.position.x + bodyB.position.x) / 2;
                const midY = (bodyA.position.y + bodyB.position.y) / 2;
                World.remove(engine.world, [bodyA, bodyB]);
                combo++; playSFX('merge', combo); triggerAnnouncer();
                const container = document.getElementById('game-container');
                container.classList.remove('shake'); void container.offsetWidth; container.classList.add('shake');
                
                const next = Bodies.circle(midX, midY, CONF.fruits[lvl+1].radius, {
                    label: 'fruit', plugin: { level: lvl + 1, scale: 0.1, isMerging: false }
                });
                World.add(engine.world, next);
                score += (lvl + 1) * 20; updateScore();
                return;
            }
        }
        if (Math.max(bodyA.speed, bodyB.speed) > 1.5) playSFX('bounce');
    });
});

function updateScore() {
    document.getElementById('score').innerText = score;
}

function saveHighscore() {
    if (score > highscore) {
        highscore = score;
        localStorage.setItem('sanrio_highscore', highscore);
        document.getElementById('highscore-ui').innerText = highscore;
    }
}

function triggerAnnouncer() {
    const el = document.getElementById('announcer');
    const lines = ["NICE!", "PERFECT!", "AMAZING!", "WOW!", "UNSTOPPABLE!"];
    el.innerHTML = `${lines[Math.min(combo-1, 4)]}<br><span style="font-size:30px">${combo}x</span>`;
    el.classList.add('pop-announcer');
    clearTimeout(comboTimer);
    comboTimer = setTimeout(() => { el.classList.remove('pop-announcer'); combo = 0; }, 1500);
}

Events.on(render, 'afterRender', () => {
    const ctx = render.context;
    if (canDrop && gameStarted && !gameOver) drawFruit(ctx, mouseX, 60, CONF.fruits[currentIdx], 0, 0.5, 1);
    Composite.allBodies(engine.world).forEach(body => {
        if (body.label === 'fruit') {
            if (body.plugin.scale < 1) body.plugin.scale += 0.12;
            // Check if fruit crosses the top boundary (gameover condition)
            if (body.position.y < 0 && gameStarted && !gameOver) {
                gameOverFunc();
            }
            drawFruit(ctx, body.position.x, body.position.y, CONF.fruits[body.plugin.level], body.angle, 1, body.plugin.scale);
        }
    });
});

// Handle window resize to adjust basket responsively
window.addEventListener('resize', () => {
    const dims = getContainerDimensions();
    if (CONF.width !== dims.width || CONF.height !== dims.height) {
        CONF.width = dims.width;
        CONF.height = dims.height;
        Render.setSize(render, CONF.width, CONF.height);
    }
});

function drawFruit(ctx, x, y, data, angle, alpha, s) {
    const img = images[data.name];
    const r = data.radius * s;
    ctx.save();
    ctx.translate(x + 4, y + 6);
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.translate(x, y); ctx.rotate(angle); ctx.globalAlpha = alpha;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
    ctx.lineWidth = 6; ctx.strokeStyle = data.color; ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.clip();
    if (img.complete) ctx.drawImage(img, -r, -r, r*2, r*2);
    const g = ctx.createRadialGradient(-r*0.3, -r*0.3, r*0.1, 0, 0, r);
    g.addColorStop(0, 'rgba(255,255,255,0.4)'); g.addColorStop(1, 'rgba(0,0,0,0.2)');
    ctx.fillStyle = g; ctx.fillRect(-r, -r, r*2, r*2);
    ctx.restore();
}

Runner.run(Runner.create(), engine);
Render.run(render);
</script>
</body>
</html>
